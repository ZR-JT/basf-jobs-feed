import json
import asyncio
from playwright.async_api import async_playwright
from datetime import datetime

SEARCH_URL = "https://basf.jobs/?currentPage=1&pageSize=1000&addresses%2Fcountry=Germany"

async def scrape_jobs():
    all_requests = []
    all_responses = []

    async with async_playwright() as p:
        browser = await p.chromium.launch()
        context = await browser.new_context()
        page = await context.new_page()

        # Request-Handler VOR dem goto registrieren
        async def handle_request(request):
            url = request.url
            method = request.method
            headers = dict(request.headers)
            body = request.post_data or ""
            all_requests.append({
                "url": url,
                "method": method,
                "has_body": len(body) > 0,
                "body_preview": body[:200],
                "auth_header": headers.get("api-key", headers.get("authorization", "KEIN AUTH"))
            })
            if "search" in url.lower() or "azure" in url.lower() or "job" in url.lower():
                print(f"REQUEST: {method} {url}")
                print(f"  Auth: {headers.get('api-key', headers.get('authorization', 'keine'))[:80]}")
                print(f"  Body: {body[:200]}")

        async def handle_response(response):
            url = response.url
            if "search" in url.lower() or "azure" in url.lower():
                try:
                    body = await response.json()
                    all_responses.append({
                        "url": url,
                        "status": response.status,
                        "keys": list(body.keys()) if isinstance(body, dict) else "list",
                        "preview": str(body)[:400]
                    })
                    print(f"RESPONSE: {response.status} {url}")
                    print(f"  Keys: {list(body.keys()) if isinstance(body, dict) else 'list'}")
                    print(f"  Preview: {str(body)[:300]}")
                except:
                    pass

        context.on("request", handle_request)
        context.on("response", handle_response)

        print("Starte Browser und lade Seite...")
        await page.goto(SEARCH_URL, timeout=60000, wait_until="domcontentloaded")
        print("DOM geladen, warte 10 Sekunden auf API-Calls...")
        await page.wait_for_timeout(10000)

        print(f"\n=== ALLE REQUESTS ({len(all_requests)}) ===")
        for r in all_requests:
            print(f"{r['method']} {r['url']}")
            if r['has_body']:
                print(f"  Body: {r['body_preview']}")
            if r['auth_header'] != 'KEIN AUTH':
                print(f"  Auth: {r['auth_header'][:100]}")

        print(f"\n=== RESPONSES ({len(all_responses)}) ===")
        for r in all_responses:
            print(f"{r['status']} {r['url']}")
            print(f"  Keys: {r['keys']}")
            print(f"  Preview: {r['preview'][:200]}")

        await browser.close()

    output = {
        "last_updated": datetime.utcnow().strftime("%Y-%m-%dT%H:%M:%SZ"),
        "total_active": 0,
        "debug_requests": len(all_requests),
        "debug_responses": all_responses[:3],
        "jobs": []
    }

    with open("jobs.json", "w", encoding="utf-8") as f:
        json.dump(output, f, ensure_ascii=False, indent=2)

asyncio.run(scrape_jobs())
