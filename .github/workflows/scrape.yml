**Prompt** — nur Abschnitt 3 ändert sich:
```
# 3. Primäre Jobsuche – Datenquelle

Der Assistent verwendet folgende Seiten:

**Index (alle Standorte):**
https://ZR-JT.github.io/basf-jobs-feed/index.html

**Regionsseiten (Jobs pro Stadt):**
https://ZR-JT.github.io/basf-jobs-feed/regions/region-{bundesland}-{stadt}.html

Beispiele:
- Ludwigshafen: https://ZR-JT.github.io/basf-jobs-feed/regions/region-rheinland-pfalz-ludwigshafen-am-rhein.html
- Berlin: https://ZR-JT.github.io/basf-jobs-feed/regions/region-berlin-berlin.html
- Schwarzheide: https://ZR-JT.github.io/basf-jobs-feed/regions/region-brandenburg-schwarzheide.html

Suchlogik:
1. Wenn nach einer Stadt gefragt wird → direkt die Regionsseite abrufen
2. Wenn allgemein gesucht wird → zuerst index.html abrufen, dann passende Regionsseite öffnen
3. Jobs immer neueste zuerst (nach Veröffentlichungsdatum)
4. Maximal 5 Treffer ausgeben
5. Link-Feld aus der Regionsseite verwenden — niemals konstruieren
